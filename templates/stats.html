<!doctype html>
<html lang="en">
  <div class="main-container">
    <header>
      <title>LinkGrabber {{ channel }} Statistics </title>
      <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/main.css') }}">
    </header>
    <body>
      <h1>
        Statistics for {{ server }} {{ channel }}
      </h1>
      <h2>
        Total Links: {{ total }}
      </h2>
      <table class="TFtable">
        {% for host in hosts %}
        <tr>
          <td>
            {{ host[1] }} {{ host[0] }}
          </td>
        </tr>
        {% endfor %}
      </table>
    </body>
    <h2>
    <center>
      <a href="/">Links</a>
    </center>
    <h2>
    <footer>
      <h6>
        LinkGrabber
	<br>
        <a href="https://github.com/daviddever/LinkGrabber">github.com/daviddever/LinkGrabber</a>
      </h6>
    </footer>
  </div>
</html>
